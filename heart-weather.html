<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>SoundTemple — Heart Weather</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Playfair+Display:ital@0;1&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet">
<link href="https://unpkg.com/uplot@1.6.31/dist/uPlot.min.css" rel="stylesheet">
<style>
  :root{
    --void:#05030C; --void2:#0D0A1A; --surface:#140F26;
    --cream:#F2EAD8; --muted:rgba(242,234,216,0.46); --line:rgba(242,234,216,0.10);
    --teal:#4AADAD; --teal-bright:#5CC5C5; --teal-deep:#2D7D7D; --jade:#0D4038;
    --violet:#6B3FA0; --violet-mid:#8B5FCA;
    --gold:#C4922A; --gold-light:#E8B84B; --gold-bright:#F5D47A;
    --f-display:'Cormorant Garamond',Georgia,serif; --f-edit:'Playfair Display',Georgia,serif; --f-mono:'DM Mono',monospace;
  }
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;}
  body{background:var(--void);color:var(--cream);font-family:var(--f-mono);overflow:hidden;}
  #map{position:absolute;inset:0;background:var(--void);}
  #fx{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:2;}
  .maplibregl-ctrl-attrib{font-size:8px!important;background:rgba(5,3,12,0.5)!important;}
  .maplibregl-ctrl-attrib a{color:rgba(242,234,216,0.4)!important;}
  .maplibregl-ctrl-group{background:rgba(13,10,26,0.7)!important;border:1px solid var(--line)!important;}
  .maplibregl-ctrl-group button+button{border-top:1px solid var(--line)!important;}

  .topbar{position:absolute;top:0;left:0;right:0;z-index:6;display:flex;align-items:flex-start;justify-content:space-between;
    padding:20px clamp(16px,3vw,32px);pointer-events:none;
    background:linear-gradient(to bottom,rgba(5,3,12,0.75),transparent);}
  .brand{pointer-events:auto;text-decoration:none;}
  .brand .wm{font-family:var(--f-mono);font-size:9px;letter-spacing:0.34em;text-transform:uppercase;color:var(--teal-bright);}
  .brand .sub{font-family:var(--f-mono);font-size:7px;letter-spacing:0.26em;text-transform:uppercase;color:var(--muted);margin-top:3px;}
  .hero-metric{text-align:right;pointer-events:none;}
  .hero-metric .v{font-family:var(--f-display);font-weight:300;font-size:clamp(1.6rem,3vw,2.4rem);line-height:1;color:var(--gold-light);}
  .hero-metric .l{font-family:var(--f-mono);font-size:7px;letter-spacing:0.26em;text-transform:uppercase;color:var(--muted);margin-top:4px;}

  .crumb{position:absolute;top:64px;left:clamp(16px,3vw,32px);z-index:6;display:flex;gap:8px;align-items:center;
    font-family:var(--f-mono);font-size:8px;letter-spacing:0.2em;text-transform:uppercase;color:var(--muted);
    opacity:0;transition:opacity .4s ease;pointer-events:none;}
  .crumb.show{opacity:1;pointer-events:auto;}
  .crumb button{background:none;border:0;color:var(--teal-bright);font-family:inherit;font-size:inherit;letter-spacing:inherit;
    text-transform:inherit;cursor:pointer;padding:0;}
  .crumb .sep{color:rgba(242,234,216,0.3);}

  .layers{position:absolute;bottom:22px;left:50%;transform:translateX(-50%);z-index:6;display:flex;gap:2px;
    background:rgba(13,10,26,0.7);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    border:1px solid var(--line);border-radius:30px;padding:4px;}
  .layers button{background:none;border:0;color:var(--muted);font-family:var(--f-mono);font-size:8px;letter-spacing:0.18em;
    text-transform:uppercase;padding:8px 16px;border-radius:24px;cursor:pointer;transition:background .3s,color .3s;}
  .layers button.on{background:rgba(74,173,173,0.16);color:var(--teal-bright);}

  .badge{position:absolute;bottom:22px;right:clamp(16px,3vw,32px);z-index:6;
    font-family:var(--f-mono);font-size:7px;letter-spacing:0.16em;color:rgba(242,234,216,0.4);
    background:rgba(13,10,26,0.6);border:1px solid var(--line);border-radius:20px;padding:7px 14px;max-width:240px;text-align:right;}

  #intro{position:absolute;inset:0;z-index:20;background:radial-gradient(ellipse at 50% 45%,rgba(42,21,64,0.5),var(--void) 70%);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;transition:opacity 1.1s ease;}
  #intro.gone{opacity:0;pointer-events:none;}
  .intro-node{width:16px;height:16px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#9BE8E8,#4AADAD 55%,#0D4038);
    animation:nodeBreath 4.5s ease-in-out infinite;box-shadow:0 0 40px rgba(92,197,197,0.5);}
  @keyframes nodeBreath{0%,100%{transform:scale(0.82);opacity:0.7;}50%{transform:scale(1.1);opacity:1;}}
  .intro-title{font-family:var(--f-display);font-weight:300;font-style:italic;font-size:clamp(2.6rem,7vw,5rem);color:var(--cream);}
  .intro-sub{font-family:var(--f-mono);font-size:9px;letter-spacing:0.28em;text-transform:uppercase;color:var(--muted);}

  #tagline{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:5;pointer-events:none;
    font-family:var(--f-edit);font-style:italic;font-size:clamp(1.3rem,2.6vw,2rem);color:var(--gold-light);
    text-align:center;opacity:0;transition:opacity 1.4s ease;text-shadow:0 2px 30px rgba(5,3,12,0.9);max-width:80vw;}

  .sheet{position:absolute;top:0;right:0;height:100%;width:min(440px,92vw);z-index:8;
    background:linear-gradient(160deg,rgba(20,15,38,0.94),rgba(5,3,12,0.97));
    backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);border-left:1px solid var(--line);
    transform:translateX(102%);transition:transform .55s cubic-bezier(0.32,0.72,0,1);
    overflow-y:auto;overflow-x:hidden;padding:26px clamp(20px,2.4vw,32px) 60px;}
  .sheet.open{transform:translateX(0);}
  .sheet::-webkit-scrollbar{width:0;}
  .sheet-close{position:sticky;top:0;float:right;background:none;border:0;color:var(--muted);font-size:18px;cursor:pointer;z-index:2;}
  .sheet-eyebrow{font-family:var(--f-mono);font-size:7px;letter-spacing:0.3em;text-transform:uppercase;color:var(--teal-bright);}
  .sheet h2{font-family:var(--f-display);font-weight:300;font-style:italic;font-size:clamp(1.7rem,3vw,2.5rem);line-height:1.05;margin:8px 0 4px;}
  .sheet .where{font-family:var(--f-mono);font-size:9px;letter-spacing:0.06em;color:var(--muted);}

  .statrow{display:flex;gap:18px;margin:22px 0;flex-wrap:wrap;}
  .stat .n{font-family:var(--f-display);font-size:1.7rem;line-height:1;}
  .stat .k{font-family:var(--f-mono);font-size:7px;letter-spacing:0.22em;text-transform:uppercase;color:var(--muted);margin-top:5px;}

  .divider{height:1px;background:var(--line);margin:22px 0;}
  .section-label{font-family:var(--f-mono);font-size:7px;letter-spacing:0.3em;text-transform:uppercase;color:rgba(92,197,197,0.55);margin-bottom:12px;}

  .crown{display:flex;align-items:center;gap:14px;margin-bottom:6px;}
  .crown canvas{width:60px;height:60px;flex-shrink:0;}
  .crown .ch{font-family:var(--f-display);font-style:italic;font-size:1.7rem;line-height:1.05;}
  .crown .state{font-family:var(--f-edit);font-style:italic;font-size:0.82rem;color:var(--teal-bright);margin-top:2px;line-height:1.3;}

  .feels{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:6px 0;}
  .feel{border:1px solid var(--line);border-radius:10px;padding:16px 14px;min-height:104px;display:flex;flex-direction:column;justify-content:space-between;}
  .feel.heavy{background:linear-gradient(180deg,rgba(107,63,160,0.18),transparent);}
  .feel.joy{background:linear-gradient(180deg,rgba(196,146,42,0.16),transparent);}
  .feel .fl{font-family:var(--f-mono);font-size:7px;letter-spacing:0.22em;text-transform:uppercase;color:var(--muted);}
  .feel .ft{font-family:var(--f-display);font-style:italic;font-size:1.25rem;line-height:1.15;margin-top:auto;}

  .favs{display:flex;gap:12px;overflow-x:auto;padding-bottom:8px;scroll-snap-type:x mandatory;}
  .favs::-webkit-scrollbar{height:0;}
  .fav{flex:0 0 132px;scroll-snap-align:start;}
  .fav .art{width:132px;height:132px;border-radius:10px;overflow:hidden;border:1px solid var(--line);background:var(--surface);}
  .fav .art img{width:100%;height:100%;object-fit:cover;display:block;}
  .fav .ft{font-family:var(--f-display);font-size:1.02rem;line-height:1.1;margin-top:9px;}
  .fav .fm{font-family:var(--f-mono);font-size:7px;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);margin-top:3px;}
  .wow{display:flex;gap:4px;margin-top:7px;}
  .wow i{width:9px;height:9px;border-radius:50%;background:rgba(242,234,216,0.14);display:block;}
  .wow i.on{background:var(--gold-light);box-shadow:0 0 7px rgba(232,184,75,0.7);animation:wowb 3.4s ease-in-out infinite;}
  @keyframes wowb{0%,100%{opacity:0.65;}50%{opacity:1;}}

  #hrv{width:100%;}
  .uplot,.uplot *{font-family:var(--f-mono)!important;}

  .wave-box{margin-top:8px;}
  .wave-btn{width:100%;font-family:var(--f-mono);font-size:9px;letter-spacing:0.26em;text-transform:uppercase;color:var(--void);
    background:var(--gold-light);border:0;border-radius:30px;padding:14px;cursor:pointer;transition:background .3s,transform .15s;}
  .wave-btn:hover{background:var(--gold-bright);transform:translateY(-1px);}
  .wave-btn:disabled{opacity:0.5;cursor:default;transform:none;background:rgba(242,234,216,0.12);color:var(--muted);}
  .wave-note{font-family:var(--f-mono);font-size:9px;line-height:1.6;color:var(--teal-bright);margin-top:12px;display:none;}
  .wave-msg{width:100%;margin-top:10px;background:rgba(255,255,255,0.03);border:1px solid var(--line);border-radius:8px;
    color:var(--cream);font-family:var(--f-mono);font-size:11px;padding:11px 13px;resize:vertical;min-height:54px;}
  .wave-msg::placeholder{color:rgba(242,234,216,0.32);}
  .optout{font-family:var(--f-mono);font-size:8px;letter-spacing:0.04em;color:var(--muted);margin-top:10px;line-height:1.5;}

  .people{display:flex;flex-direction:column;gap:2px;}
  .person{display:flex;align-items:center;gap:12px;padding:10px 8px;border-radius:8px;cursor:pointer;transition:background .25s;}
  .person:hover{background:rgba(255,255,255,0.04);}
  .person canvas{width:30px;height:30px;flex-shrink:0;}
  .person .ph{font-family:var(--f-display);font-style:italic;font-size:1.05rem;line-height:1;}
  .person .pm{font-family:var(--f-mono);font-size:7px;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);margin-top:2px;}
  .person .spark{margin-left:auto;}

  .hint{position:absolute;bottom:70px;left:50%;transform:translateX(-50%);z-index:5;font-family:var(--f-edit);font-style:italic;
    font-size:0.95rem;color:var(--muted);opacity:0;transition:opacity 1s ease;pointer-events:none;}
  .hint.show{opacity:0.8;}

  @media (max-width:560px){
    .sheet{width:100vw;}
    .hero-metric{display:none;}
    .feels{grid-template-columns:1fr;}
  }
</style>
</head>
<body>

<div id="map"></div>
<canvas id="fx"></canvas>

<div class="topbar">
  <a class="brand" href="index.html">
    <div class="wm">SoundTemple</div>
    <div class="sub">Heart Weather</div>
  </a>
  <div class="hero-metric">
    <div class="v" id="globalCoherence">—</div>
    <div class="l">National Coherence · now</div>
  </div>
</div>

<div class="crumb" id="crumb">
  <button id="crumb-home">United States</button>
  <span class="sep" id="crumb-sep" style="display:none">›</span>
  <span id="crumb-loc"></span>
</div>

<div id="tagline"></div>
<div class="hint" id="hint">come closer — touch a light</div>

<div class="layers" id="layers">
  <button data-layer="field" class="on">Field</button>
  <button data-layer="circadian">Day / Night</button>
  <button data-layer="souls">All Souls</button>
</div>

<div class="badge">Illustrative data — a living preview of how Heart Weather will feel.</div>

<div class="sheet" id="sheet"><div id="sheet-body"></div></div>

<div id="intro">
  <div class="intro-node"></div>
  <div class="intro-title">Heart Weather</div>
  <div class="intro-sub">the country, breathing</div>
</div>

<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<script src="https://unpkg.com/uplot@1.6.31/dist/uPlot.iife.min.js"></script>
<script>
(function(){
  'use strict';
  var REDUCED = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  function lerp(a,b,t){return a+(b-a)*t;}
  function mix(c1,c2,t){return [Math.round(lerp(c1[0],c2[0],t)),Math.round(lerp(c1[1],c2[1],t)),Math.round(lerp(c1[2],c2[2],t))];}
  var JADE=[13,64,56],TEAL=[74,173,173],TEALB=[92,197,197],GOLDL=[232,184,75];
  function coherenceRGB(c){
    if(c<0.35) return mix(JADE,TEAL,c/0.35);
    if(c<0.70) return mix(TEAL,TEALB,(c-0.35)/0.35);
    return mix(TEALB,GOLDL,(c-0.70)/0.30);
  }
  function rgba(rgb,a){return 'rgba('+rgb[0]+','+rgb[1]+','+rgb[2]+','+a+')';}

  var SPRITES=[],BUCKETS=12,SPR=128;
  for(var b=0;b<BUCKETS;b++){
    var cv=document.createElement('canvas');cv.width=cv.height=SPR;
    var g=cv.getContext('2d');var rgb=coherenceRGB(b/(BUCKETS-1));
    var rg=g.createRadialGradient(SPR/2,SPR/2,0,SPR/2,SPR/2,SPR/2);
    rg.addColorStop(0,rgba(rgb,0.95));rg.addColorStop(0.25,rgba(rgb,0.55));
    rg.addColorStop(0.55,rgba(rgb,0.16));rg.addColorStop(1,rgba(rgb,0));
    g.fillStyle=rg;g.fillRect(0,0,SPR,SPR);
    SPRITES.push(cv);
  }
  function spriteFor(c){return SPRITES[Math.max(0,Math.min(BUCKETS-1,Math.round(c*(BUCKETS-1))))];}

  var CARTO='https://a.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}@2x.png';
  var map=new maplibregl.Map({
    container:'map',
    style:{version:8,sources:{carto:{type:'raster',tiles:[CARTO],tileSize:256,
      attribution:'© OpenStreetMap, © CARTO · SoundTemple illustrative data'}},
      layers:[{id:'bg',type:'background',paint:{'background-color':'#05030c'}},
        {id:'carto',type:'raster',source:'carto',paint:{'raster-opacity':0.82,'raster-saturation':-0.25}}]},
    center:[-96,38.5],zoom:3.4,minZoom:3,maxZoom:17,dragRotate:false,attributionControl:true,
    pitchWithRotate:false,renderWorldCopies:false
  });
  map.addControl(new maplibregl.NavigationControl({showCompass:false}),'bottom-left');

  var fx=document.getElementById('fx'),fctx=fx.getContext('2d'),DPR=Math.min(2,window.devicePixelRatio||1);
  function sizeFX(){fx.width=fx.clientWidth*DPR;fx.height=fx.clientHeight*DPR;fctx.setTransform(DPR,0,0,DPR,0,0);}
  window.addEventListener('resize',sizeFX);sizeFX();

  var LOC=[],USR=[],SESS={},usersByLoc={},rendered=[],mode='nation',selLoc=null,selUser=null;
  var layer='field',introWaveStart=0,t0=performance.now();

  Promise.all([
    fetch('data/locations.json').then(function(r){return r.json();}),
    fetch('data/users.json').then(function(r){return r.json();}),
    fetch('data/sessions.json').then(function(r){return r.json();})
  ]).then(function(res){
    LOC=res[0];USR=res[1];res[2].forEach(function(s){SESS[s.key]=s;});
    USR.forEach(function(u){(usersByLoc[u.locationId]=usersByLoc[u.locationId]||[]).push(u);});
    var avg=LOC.reduce(function(a,l){return a+l.coherence;},0)/LOC.length;
    document.getElementById('globalCoherence').textContent=avg.toFixed(2);
    if(map.loaded()) boot(); else { map.once('load',boot); setTimeout(boot,1800); }
  }).catch(function(e){console.error('data load failed',e);});

  var booted=false;
  map.on('resize',sizeFX);
  function boot(){
    if(booted)return;booted=true;
    sizeFX();
    setTimeout(function(){
      document.getElementById('intro').classList.add('gone');
      if(!REDUCED) introWaveStart=performance.now();
      flashTagline('This is how the country’s heart is breathing right now.');
      setTimeout(function(){document.getElementById('hint').classList.add('show');},2600);
      setTimeout(function(){document.getElementById('hint').classList.remove('show');},7000);
    },1300);
  }

  function flashTagline(txt){
    var el=document.getElementById('tagline');el.textContent=txt;
    requestAnimationFrame(function(){el.style.opacity='1';});
    setTimeout(function(){el.style.opacity='0';},3400);
  }

  function activeSet(){
    var z=map.getZoom();
    if(mode==='location'&&selLoc){
      var arr=(usersByLoc[selLoc.id]||[]).map(function(u){return{type:'user',ref:u,lng:u.lon,lat:u.lat,c:u.coherence};});
      arr.push({type:'loc',ref:selLoc,lng:selLoc.lon,lat:selLoc.lat,c:selLoc.coherence,big:true});
      return arr;
    }
    if(layer==='souls'){
      return USR.map(function(u){return{type:'user',ref:u,lng:u.lon,lat:u.lat,c:u.coherence};});
    }
    if(z>=6){
      var bb=map.getBounds();var out=[];
      LOC.forEach(function(l){out.push({type:'loc',ref:l,lng:l.lon,lat:l.lat,c:l.coherence,big:true});});
      var n=0;
      for(var i=0;i<USR.length&&n<700;i++){var u=USR[i];
        if(u.lon>=bb.getWest()&&u.lon<=bb.getEast()&&u.lat>=bb.getSouth()&&u.lat<=bb.getNorth()){out.push({type:'user',ref:u,lng:u.lon,lat:u.lat,c:u.coherence});n++;}}
      return out;
    }
    return LOC.map(function(l){return{type:'loc',ref:l,lng:l.lon,lat:l.lat,c:l.coherence,big:true};});
  }

  function loop(now){
    requestAnimationFrame(loop);
    if(!map)return;
    var _t=map.project([-96,38.5]); if(!_t||!isFinite(_t.x))return; // wait only until projection is ready (independent of tile/style load)
    var W=fx.clientWidth,H=fx.clientHeight;
    fctx.clearRect(0,0,W,H);
    if(layer==='circadian') drawCircadian(W,H);
    var set=activeSet();rendered=[];
    var T=(now-t0)/1000;
    var moving=map.isMoving&&map.isMoving();
    var waveFront=null;
    if(introWaveStart){var e=(now-introWaveStart)/2600;if(e>=1.15)introWaveStart=0;else waveFront=e*1.25-0.1;}
    fctx.globalCompositeOperation='lighter';
    for(var i=0;i<set.length;i++){
      var s=set[i];var p=map.project([s.lng,s.lat]);
      if(p.x<-60||p.x>W+60||p.y<-60||p.y>H+60)continue;
      var period=s.type==='user'?s.ref.breathRate:(6+s.c*6);
      var phase=s.type==='user'?s.ref.phaseOffset:(i%7);
      var breath=REDUCED?0.7:(0.5+0.5*Math.sin(T*(2*Math.PI/period)+phase));
      if(moving&&!REDUCED) breath=0.45;
      var base=s.big?(10+s.c*22+(s.ref.userCount||0)*0.06):(3.2+s.c*5.5);
      var rad=base*(0.72+0.5*breath);
      var bright=0.5+0.5*breath;
      if(waveFront!=null){var dx=p.x/W-waveFront;var near=Math.exp(-(dx*dx)/0.006);bright=Math.min(1,bright+near*1.1);rad*=1+near*0.6;}
      var spr=spriteFor(s.c);var d=rad*2;
      fctx.globalAlpha=Math.min(1,(s.big?0.5:0.32)+bright*0.5);
      fctx.drawImage(spr,p.x-rad,p.y-rad,d,d);
      fctx.globalAlpha=Math.min(1,bright*(s.big?0.9:0.6));
      var rgb=coherenceRGB(s.c);fctx.fillStyle=rgba(rgb,1);
      fctx.beginPath();fctx.arc(p.x,p.y,s.big?2.6:1.5,0,7);fctx.fill();
      rendered.push({x:p.x,y:p.y,r:rad,hit:Math.max(s.big?16:10,rad),s:s});
    }
    fctx.globalCompositeOperation='source-over';fctx.globalAlpha=1;
  }

  function drawCircadian(W,H){
    var now=new Date();var utc=now.getUTCHours()+now.getUTCMinutes()/60;
    var subsolarLon=-15*(utc-12);
    var grd=fctx.createLinearGradient(0,0,W,0);
    for(var i=0;i<=10;i++){var x=i/10;var lonAtX=-125+x*((-67)-(-125));
      var dd=Math.abs(((lonAtX-subsolarLon+540)%360)-180);
      var night=Math.min(1,Math.max(0,(dd-60)/120));
      grd.addColorStop(x,'rgba(5,3,16,'+(night*0.62).toFixed(3)+')');}
    fctx.fillStyle=grd;fctx.fillRect(0,0,W,H);
  }

  function hitTest(pt){
    var best=null,bd=1e9;
    for(var i=0;i<rendered.length;i++){var r=rendered[i];var dx=r.x-pt.x,dy=r.y-pt.y,dd=dx*dx+dy*dy;
      if(dd<r.hit*r.hit&&dd<bd){bd=dd;best=r.s;}}
    return best;
  }
  map.on('mousemove',function(e){map.getCanvas().style.cursor=hitTest(e.point)?'pointer':'';});
  map.on('click',function(e){
    var s=hitTest(e.point);if(!s)return;
    if(s.type==='loc') selectLocation(s.ref);
    else openUser(s.ref);
  });

  function selectLocation(loc){
    selLoc=loc;mode='location';selUser=null;
    map.flyTo({center:[loc.lon,loc.lat],zoom:loc.venueZoom-2.4,duration:1400,curve:1.5});
    document.getElementById('crumb').classList.add('show');
    document.getElementById('crumb-sep').style.display='';
    document.getElementById('crumb-loc').textContent=loc.name;
    renderLocationSheet(loc);openSheet();
  }
  function goHome(){
    mode='nation';selLoc=null;selUser=null;closeSheet();
    document.getElementById('crumb').classList.remove('show');
    document.getElementById('crumb-sep').style.display='none';
    document.getElementById('crumb-loc').textContent='';
    map.flyTo({center:[-96,38.5],zoom:3.4,duration:1300});
  }
  document.getElementById('crumb-home').onclick=goHome;

  function openSheet(){document.getElementById('sheet').classList.add('open');}
  function closeSheet(){document.getElementById('sheet').classList.remove('open');}

  function el(tag,cls,txt){var e=document.createElement(tag);if(cls)e.className=cls;if(txt!=null)e.textContent=txt;return e;}
  function clearSheet(){var b=document.getElementById('sheet-body');while(b.firstChild)b.removeChild(b.firstChild);return b;}
  function closeBtn(b){var c=el('button','sheet-close','✕');c.onclick=function(){ if(mode==='location'&&selUser){selUser=null;renderLocationSheet(selLoc);} else goHome(); };b.appendChild(c);}
  function statusWord(s){return s==='broadcast'?'Broadcasting':s==='active'?'Active':s==='online'?'Online':'Resting';}

  function renderLocationSheet(loc){
    var b=clearSheet();closeBtn(b);
    b.appendChild(el('div','sheet-eyebrow',statusWord(loc.status)+' · Temple'));
    b.appendChild(el('h2',null,loc.name));
    b.appendChild(el('div','where',loc.city));
    var sr=el('div','statrow');
    [[loc.coherence.toFixed(2),'Coherence'],[loc.userCount,'Hearts here'],[loc.sessionsToday,'Sessions today']].forEach(function(p){
      var st=el('div','stat');var n=el('div','n',p[0]);n.style.color=rgba(coherenceRGB(loc.coherence),1);st.appendChild(n);st.appendChild(el('div','k',p[1]));sr.appendChild(st);});
    b.appendChild(sr);
    b.appendChild(el('div','divider'));
    b.appendChild(el('div','section-label','People here now'));
    var list=el('div','people');
    (usersByLoc[loc.id]||[]).slice(0,40).forEach(function(u){
      var row=el('div','person');
      var cc=document.createElement('canvas');cc.width=cc.height=60;drawSigil(cc,u.sigilSeed,u.coherence);row.appendChild(cc);
      var info=el('div');info.appendChild(el('div','ph',u.handle));
      info.appendChild(el('div','pm','coherence '+u.coherence.toFixed(2)+' · '+u.rmssd+' ms'));row.appendChild(info);
      var sp=el('div','spark');sp.appendChild(sparkline(u,84,24));row.appendChild(sp);
      row.onclick=function(){openUser(u);};list.appendChild(row);
    });
    b.appendChild(list);
    document.getElementById('sheet').scrollTop=0;
  }

  function openUser(u){
    selUser=u;
    if(!selLoc||selLoc.id!==u.locationId){var l=null;for(var i=0;i<LOC.length;i++){if(LOC[i].id===u.locationId){l=LOC[i];break;}}
      if(l){selLoc=l;mode='location';
        document.getElementById('crumb').classList.add('show');document.getElementById('crumb-sep').style.display='';document.getElementById('crumb-loc').textContent=l.name;
        map.flyTo({center:[l.lon,l.lat],zoom:l.venueZoom-2.4,duration:1200});}}
    renderUserSheet(u);openSheet();
  }

  function renderUserSheet(u){
    var b=clearSheet();closeBtn(b);
    var crown=el('div','crown');var cc=document.createElement('canvas');cc.width=cc.height=120;drawSigil(cc,u.sigilSeed,u.coherence);crown.appendChild(cc);
    var ci=el('div');ci.appendChild(el('div','sheet-eyebrow',u.messageable?'Open to connection':'Quietly present'));
    ci.appendChild(el('div','ch',u.handle));
    ci.appendChild(el('div','state','breathing every '+u.breathRate.toFixed(1)+'s · '+coherenceWord(u.coherence)));crown.appendChild(ci);b.appendChild(crown);

    b.appendChild(el('div','divider'));
    var feels=el('div','feels');
    var fh=el('div','feel heavy');fh.appendChild(el('div','fl','Heavy on the heart'));fh.appendChild(el('div','ft',u.heavy));
    var fj=el('div','feel joy');fj.appendChild(el('div','fl','Finding joy in'));fj.appendChild(el('div','ft',u.joy));
    feels.appendChild(fh);feels.appendChild(fj);b.appendChild(feels);

    b.appendChild(el('div','divider'));
    b.appendChild(el('div','section-label','Favorite sessions'));
    var favs=el('div','favs');
    u.favorites.forEach(function(k){var s=SESS[k];if(!s)return;
      var card=el('div','fav');var art=el('div','art');var img=document.createElement('img');img.loading='lazy';img.src=s.art;img.alt=s.title;art.appendChild(img);card.appendChild(art);
      card.appendChild(el('div','ft',s.title));card.appendChild(el('div','fm',s.category));
      var wow=el('div','wow');var filled=Math.round(u.wow);for(var i=0;i<5;i++){var dot=el('i');if(i<filled){dot.className='on';dot.style.animationDelay=(i*0.2)+'s';}wow.appendChild(dot);}card.appendChild(wow);
      favs.appendChild(card);});
    b.appendChild(favs);

    b.appendChild(el('div','divider'));
    b.appendChild(el('div','section-label','HRV over time · RMSSD (ms)'));
    var hrvWrap=el('div');hrvWrap.id='hrv';b.appendChild(hrvWrap);
    setTimeout(function(){drawHRV(hrvWrap,u);},40);
    b.appendChild(el('div','optout','Wow rating '+u.wow.toFixed(1)+'/5 — a felt measure, alongside the measured coherence.'));

    b.appendChild(el('div','divider'));
    b.appendChild(el('div','section-label','Reach out'));
    var wb=el('div','wave-box');
    var btn=el('button','wave-btn',u.messageable?'Send a wave of coherence':'Not open to messages right now');
    btn.disabled=!u.messageable;
    var msg=document.createElement('textarea');msg.className='wave-msg';msg.placeholder='a few words, heart to heart… (optional)';
    var note=el('div','wave-note');
    btn.onclick=function(){
      try{var key='st_waves';var arr=JSON.parse(localStorage.getItem(key)||'[]');arr.push({to:u.id,handle:u.handle,msg:msg.value||'',at:Date.now()});localStorage.setItem(key,JSON.stringify(arr));}catch(e){}
      btn.disabled=true;btn.textContent='Wave sent · ✨';note.style.display='block';
      note.textContent=msg.value?('Your words are on their way to '+u.handle+'. They arrive as warmth, anonymously.'):('A wave of coherence is on its way to '+u.handle+'.');
    };
    wb.appendChild(btn);if(u.messageable)wb.appendChild(msg);wb.appendChild(note);
    wb.appendChild(el('div','optout','Messages are anonymous and one-at-a-time — a gift, not a thread. They can accept, ignore, or block, always.'));
    b.appendChild(wb);
    document.getElementById('sheet').scrollTop=0;
  }

  function coherenceWord(c){return c>0.8?'deeply coherent right now':c>0.62?'settling into coherence':c>0.4?'finding the rhythm':'activated, seeking calm';}

  function drawSigil(canvas,seed,coherence){
    var s=canvas.width,ctx=canvas.getContext('2d');ctx.clearRect(0,0,s,s);
    var a=seed>>>0;function r(){a=(a+0x6D2B79F5)|0;var t=Math.imul(a^(a>>>15),1|a);t=(t+Math.imul(t^(t>>>7),61|t))^t;return((t^(t>>>14))>>>0)/4294967296;}
    var rgb=coherenceRGB(coherence);
    ctx.save();ctx.translate(s/2,s/2);
    var rings=2+Math.floor(r()*2),folds=5+Math.floor(r()*4);
    for(var ring=0;ring<rings;ring++){
      var rad=s*0.12+ring*s*0.13;var rot=r()*Math.PI;
      ctx.strokeStyle=rgba(rgb,0.4+ring*0.18);ctx.lineWidth=1.1;
      ctx.beginPath();
      for(var i=0;i<=folds;i++){var ang=rot+i/folds*Math.PI*2;var rr=rad*(0.82+0.18*Math.sin(i*2.3+seed));var x=Math.cos(ang)*rr,y=Math.sin(ang)*rr;if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);}
      ctx.closePath();ctx.stroke();
    }
    ctx.shadowColor=rgba(rgb,0.8);ctx.shadowBlur=s*0.12;
    ctx.fillStyle=rgba(rgb,0.95);ctx.beginPath();ctx.arc(0,0,s*0.05,0,7);ctx.fill();
    ctx.restore();
  }

  function sparkline(u,w,h){
    var cv=document.createElement('canvas');cv.width=w*DPR;cv.height=h*DPR;cv.style.width=w+'px';cv.style.height=h+'px';
    var c=cv.getContext('2d');c.scale(DPR,DPR);var d=u.hrv.deltas,base=u.hrv.baseline;
    var vals=d.map(function(x){return base+x;});var mn=Math.min.apply(null,vals),mx=Math.max.apply(null,vals);
    var rgb=coherenceRGB(u.coherence);c.strokeStyle=rgba(rgb,0.9);c.lineWidth=1.2;c.beginPath();
    vals.forEach(function(v,i){var x=i/(vals.length-1)*w;var y=h-2-((v-mn)/(mx-mn||1))*(h-4);if(i===0)c.moveTo(x,y);else c.lineTo(x,y);});
    c.stroke();return cv;
  }

  var hrvPlot=null;
  function drawHRV(wrap,u){
    if(typeof uPlot==='undefined'){return;}
    if(hrvPlot){hrvPlot.destroy();hrvPlot=null;}
    var d=u.hrv.deltas,base=u.hrv.baseline,step=u.hrv.stepMin;
    var xs=d.map(function(_,i){return i*step;});var ys=d.map(function(x){return base+x;});
    var rgb=coherenceRGB(u.coherence);var stroke=rgba(rgb,1);
    var w=wrap.clientWidth||360;
    var opts={width:w,height:150,legend:{show:false},
      scales:{x:{time:false}},
      axes:[
        {stroke:'rgba(242,234,216,0.4)',grid:{show:false},ticks:{show:false},font:'9px DM Mono',
         values:function(self,vals){return vals.map(function(x){return (x/60).toFixed(0)+'h';});}},
        {stroke:'rgba(242,234,216,0.4)',grid:{stroke:'rgba(242,234,216,0.06)'},ticks:{show:false},font:'9px DM Mono',size:34}
      ],
      series:[{},{stroke:stroke,width:2,points:{show:false},
        fill:function(self){var g=self.ctx.createLinearGradient(0,0,0,150);g.addColorStop(0,rgba(rgb,0.32));g.addColorStop(1,rgba(rgb,0));return g;}}]
    };
    hrvPlot=new uPlot(opts,[xs,ys],wrap);
  }

  document.getElementById('layers').addEventListener('click',function(e){
    var btn=e.target.closest('button');if(!btn)return;
    layer=btn.getAttribute('data-layer');
    Array.prototype.forEach.call(this.querySelectorAll('button'),function(x){x.classList.toggle('on',x===btn);});
  });

  map.on('error',function(e){/* tolerate tile errors */});
  requestAnimationFrame(loop); // run continuously; loop self-guards until the map can project
})();
</script>
